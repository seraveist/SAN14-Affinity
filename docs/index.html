<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>삼국지14 친애 편성기</title>
    <link rel="stylesheet" href="./styles.css?v=20260529-2" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="control-pane">
        <div class="brand">
          <span class="brand-mark">14</span>
          <div>
            <h1>삼국지14 친애 편성기</h1>
          </div>
        </div>

        <div class="segmented" role="tablist" aria-label="분석 모드">
          <button class="segment active" type="button" data-mode="roster">보유 장수 편성</button>
          <button class="segment" type="button" data-mode="single">중심 분석</button>
        </div>

        <section class="form-section" data-panel="roster">
          <label for="rosterInput">보유 장수</label>
          <textarea id="rosterInput" spellcheck="false" autocomplete="off"></textarea>
          <div class="roster-limits">
            <label class="limit-field" for="groupCount">
              <span>목표 집단 수</span>
              <input id="groupCount" type="number" min="1" value="4" />
            </label>
            <label class="limit-field" for="maxSize">
              <span>집단당 최대 인원</span>
              <input id="maxSize" type="number" min="3" max="20" value="10" />
            </label>
            <button id="sampleRoster" class="ghost-button" type="button">샘플</button>
          </div>
          <div id="duplicateSelectors" class="duplicate-selectors hidden"></div>
        </section>

        <section class="form-section hidden" data-panel="single">
          <label for="centerInput">중심 장수</label>
          <input id="centerInput" list="officerNames" autocomplete="off" />
          <div class="inline-controls">
            <label for="hopDepth">탐색</label>
            <input id="hopDepth" type="number" min="1" max="4" value="4" />
            <span class="unit">단계</span>
          </div>
        </section>

        <datalist id="officerNames"></datalist>

        <button id="runButton" class="run-button" type="button">분석</button>
      </aside>

      <section class="result-pane">
        <div class="result-header">
          <div>
            <h2 id="resultTitle">보유 장수 편성 결과</h2>
            <p id="resultMeta">보유 장수를 입력하고 분석하세요.</p>
          </div>
          <div id="scoreBadge" class="score-badge">READY</div>
        </div>
        <div id="resultTabs" class="result-tabs" role="tablist" aria-label="결과 보기">
          <button class="result-tab active" type="button" data-result-tab="formation">편성 결과</button>
          <button class="result-tab" type="button" data-result-tab="oath">의형제 추천</button>
        </div>
        <div id="warnings" class="warnings"></div>
        <div id="results" class="results"></div>
        <div id="oathResults" class="results hidden"></div>
      </section>
    </main>

    <template id="groupTemplate">
      <article class="group-card">
        <div class="group-top">
          <h3></h3>
          <span class="group-score"></span>
        </div>
        <div class="member-list"></div>
        <div class="relation-list"></div>
      </article>
    </template>

    <script src="./data.js?v=20260529-2"></script>
    <script src="./app.js?v=20260529-2"></script>
  </body>
</html>
